name: generate monkeytype readme svg
on:
  schedule:
    - cron: "0 */24 * * *" # Se ejecuta cada 24 horas
  workflow_dispatch:      # Te permite ejecutarlo manualmente si quieres

jobs:
  download-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate Monkeytype Readme
        uses: ridemountainpig/monkeytype-readme@v1.1
        with:
          # Asegúrate de poner tu usuario real de Monkeytype aquí
          MONKEYTYPE_USERNAME: 'clemente_abarzua' 
          MONKEYTYPE_THEME_NAME: 'nord' # Puedes cambiar 'nord' por tu tema favorito
